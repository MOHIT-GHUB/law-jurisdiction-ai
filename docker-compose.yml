# ------------------------------------------------------------
# LexAI Stack
# Start all: docker compose up -d --build
# Stop: docker compose down
# Reset data: docker compose down -v ; docker compose up -d --build
# Infra only: docker compose up -d postgres redis
# ------------------------------------------------------------

services:
  postgres:
    image: postgres:16
    container_name: lexai-postgres
    environment:
      POSTGRES_USER: lexai
      POSTGRES_PASSWORD: lexai
      POSTGRES_DB: lexai
    ports:
      - "5432:5432"           # matches DATABASE_URL in .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexai-redis
    ports:
      - "6379:6379"           # matches REDIS_URL in .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./backend
    container_name: lexai-server
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/server
      - /server/.venv
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://lexai:lexai@postgres:5432/lexai
      REDIS_URL: redis://redis:6379
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: lexai-network
